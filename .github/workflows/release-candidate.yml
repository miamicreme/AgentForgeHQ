name: Release Candidate

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'agents/**'
      - 'evaluations/**'
      - 'packages/release-gates/**'
      - 'packages/observability/**'
      - 'supabase/migrations/**'
      - 'scripts/release-readiness.mjs'

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm audit:foundation
      - run: pnpm audit:release
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
