name: Phase 2 Validation

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'packages/execution-api/**'
      - 'packages/production-runtime/**'
      - 'supabase/migrations/**'
      - 'scripts/phase2-readiness.mjs'
      - 'eslint.config.js'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: phase2-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-validation:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Static phase audit
        run: pnpm audit:phase2
      - name: Format
        run: pnpm format:check
      - name: Lint
        run: pnpm lint
      - name: Typecheck
        run: pnpm typecheck
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Dependency audit
        run: pnpm audit --audit-level=high

  strict-lockfile:
    if: ${{ hashFiles('pnpm-lock.yaml') != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: REQUIRE_LOCKFILE=1 pnpm audit:phase2
